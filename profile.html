<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Profil bearbeiten — BI Forum 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root, [data-theme="light"] {
  color-scheme: light;
  --bg: #f4f7fb; --bg-elevated: #eef3f8;
  --surface: rgba(255,255,255,0.82); --surface-strong: #ffffff; --surface-soft: #f8fafc;
  --border: rgba(15,23,42,0.08); --border-strong: rgba(15,23,42,0.14);
  --text: #0f172a; --text-muted: #64748b; --text-soft: #94a3b8;
  --primary: #2563eb; --primary-hover: #1d4ed8; --primary-soft: rgba(37,99,235,0.12);
  --shadow-sm: 0 2px 8px rgba(15,23,42,0.04); --shadow-md: 0 12px 30px rgba(15,23,42,0.08);
  --shadow-lg: 0 18px 50px rgba(15,23,42,0.12);
  --radius-xl: 28px; --content: 560px;
}
[data-theme="dark"] {
  color-scheme: dark;
  --bg: #0b1220; --bg-elevated: #111827;
  --surface: rgba(17,24,39,0.82); --surface-strong: #111827; --surface-soft: #172033;
  --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.14);
  --text: #e5edf8; --text-muted: #94a3b8; --text-soft: #64748b;
  --primary: #60a5fa; --primary-hover: #3b82f6; --primary-soft: rgba(96,165,250,0.16);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.2); --shadow-md: 0 14px 34px rgba(0,0,0,0.28);
  --shadow-lg: 0 22px 56px rgba(0,0,0,0.38);
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme]) {
    color-scheme: dark;
    --bg: #0b1220; --bg-elevated: #111827;
    --surface: rgba(17,24,39,0.82); --surface-strong: #111827; --surface-soft: #172033;
    --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.14);
    --text: #e5edf8; --text-muted: #94a3b8; --text-soft: #64748b;
    --primary: #60a5fa; --primary-hover: #3b82f6; --primary-soft: rgba(96,165,250,0.16);
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.2); --shadow-md: 0 14px 34px rgba(0,0,0,0.28);
    --shadow-lg: 0 22px 56px rgba(0,0,0,0.38);
  }
}

* { box-sizing: border-box; }
html { -webkit-font-smoothing: antialiased; }
body {
  margin: 0; min-height: 100vh;
  font-family: "Inter", system-ui, sans-serif; color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(37,99,235,0.10), transparent 22%),
    radial-gradient(circle at top right, rgba(14,165,233,0.08), transparent 18%),
    linear-gradient(180deg, var(--bg-elevated) 0%, var(--bg) 42%, var(--bg) 100%);
}
button, input { font: inherit; cursor: pointer; }
input { cursor: text; }

/* Header */
.site-header {
  position: sticky; top: 0; z-index: 40; padding: 8px 16px;
  backdrop-filter: blur(20px);
  background: color-mix(in srgb, var(--bg) 82%, transparent);
  border-bottom: 1px solid var(--border);
}
.header-inner {
  max-width: 1160px; margin: 0 auto;
  display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center;
}
.brand-title { margin: 0; font-size: 0.94rem; font-weight: 700; letter-spacing: -0.02em; }
.header-actions { display: flex; align-items: center; gap: 6px; }
.theme-toggle, .hamburger {
  min-height: 32px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text);
  display: inline-grid; place-items: center; transition: all 0.16s ease;
}
.theme-toggle { width: 34px; }
.hamburger { width: 34px; }
.hamburger:hover { background: var(--surface-soft); }

/* Nav drawer */
.nav-drawer-overlay {
  display: none; position: fixed; inset: 0; z-index: 50;
  background: rgba(15,23,42,0.38); backdrop-filter: blur(4px);
}
.nav-drawer-overlay.open { display: block; }
.nav-drawer {
  position: fixed; top: 0; right: 0; bottom: 0; z-index: 60;
  width: min(300px, 88vw); background: var(--surface-strong);
  border-left: 1px solid var(--border); box-shadow: var(--shadow-lg);
  padding: 20px; transform: translateX(100%); transition: transform 0.26s ease;
  display: flex; flex-direction: column;
}
.nav-drawer.open { transform: translateX(0); }
.nav-drawer-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
}
.nav-drawer-title { font-size: 1rem; font-weight: 700; margin: 0; letter-spacing: -0.02em; }
.nav-drawer-close {
  width: 34px; height: 34px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); display: inline-grid;
  place-items: center; transition: all 0.16s ease;
}
.nav-drawer-close:hover { background: var(--surface-soft); }
.nav-drawer-link {
  display: flex; align-items: center; gap: 10px; width: 100%;
  padding: 11px 14px; border-radius: 12px; border: 1px solid transparent;
  background: transparent; color: var(--text); font-size: 0.9rem; font-weight: 600;
  text-align: left; text-decoration: none; transition: all 0.16s ease;
}
.nav-drawer-link:hover { background: var(--surface-soft); border-color: var(--border); }
.nav-drawer-link.active { background: var(--primary-soft); color: var(--primary); }
.nav-drawer-divider { height: 1px; background: var(--border); margin: 10px 0; }

/* Page */
.page-shell { max-width: var(--content); margin: 0 auto; padding: 40px 16px 80px; }

/* Profile card */
.profile-card {
  padding: 32px;
  border-radius: var(--radius-xl);
  background: var(--surface-strong);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-lg);
}
.profile-card h1 {
  margin: 0 0 6px; font-size: 1.3rem; letter-spacing: -0.03em;
}
.profile-card > p {
  margin: 0 0 28px; color: var(--text-muted); font-size: 0.9rem;
}
label {
  display: block; margin-bottom: 6px;
  font-size: 0.9rem; font-weight: 600; color: var(--text);
}
.input-name {
  width: 100%; padding: 13px 14px; border-radius: 14px;
  border: 1px solid var(--border); background: var(--surface-soft);
  color: var(--text); font-size: 16px; line-height: 1.45;
  transition: all 0.18s ease; margin-bottom: 24px;
}
.input-name:focus {
  outline: none; border-color: rgba(37,99,235,0.34);
  box-shadow: 0 0 0 4px rgba(37,99,235,0.10); background: var(--surface-strong);
}
.icon-grid {
  display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; margin-bottom: 28px;
}
.icon-option {
  border: 1px solid var(--border); background: var(--surface-soft);
  border-radius: 12px; display: grid; place-items: center;
  font-size: 1.3rem; padding: 9px 4px; transition: all 0.16s ease; cursor: pointer;
}
.icon-option:hover { transform: translateY(-1px); border-color: rgba(37,99,235,0.2); background: var(--primary-soft); }
.icon-option.selected { background: var(--primary); border-color: transparent; box-shadow: 0 6px 16px rgba(37,99,235,0.2); }
.form-actions { display: grid; gap: 10px; }
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 18px; border-radius: 14px; border: 1px solid transparent;
  font-size: 0.92rem; font-weight: 600; transition: all 0.18s ease;
}
.btn-primary {
  background: var(--primary); color: white;
  box-shadow: 0 10px 24px rgba(37,99,235,0.18);
}
.btn-primary:hover { background: var(--primary-hover); }
.btn-secondary {
  background: var(--surface-strong); color: var(--text);
  border-color: var(--border);
}
.btn-secondary:hover { background: var(--surface-soft); }
.save-toast {
  display: none; margin-top: 12px; padding: 10px 14px;
  border-radius: 12px; background: rgba(21,128,61,0.12);
  color: #15803d; font-size: 0.88rem; font-weight: 600; text-align: center;
}
[data-theme="dark"] .save-toast { color: #4ade80; background: rgba(74,222,128,0.10); }

@media (max-width: 640px) {
  .profile-card { padding: 22px; }
  .icon-grid { grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .icon-option { font-size: 1.1rem; padding: 7px 4px; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <p class="brand-title">BI Forum 2026: Agents &amp; Mosaic</p>
    <div class="header-actions">
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Theme wechseln">
        <span aria-hidden="true">◐</span>
      </button>
      <button class="hamburger" type="button" id="navOpen" aria-label="Navigation öffnen">
        <svg width="16" height="13" viewBox="0 0 16 13" fill="none" aria-hidden="true">
          <rect width="16" height="2" rx="1" fill="currentColor"/>
          <rect y="5.5" width="16" height="2" rx="1" fill="currentColor"/>
          <rect y="11" width="16" height="2" rx="1" fill="currentColor"/>
        </svg>
      </button>
    </div>
  </div>
</header>

<div class="nav-drawer-overlay" id="navOverlay"></div>
<aside class="nav-drawer" id="navDrawer" role="dialog" aria-modal="true" aria-label="Navigation">
  <div class="nav-drawer-header">
    <p class="nav-drawer-title">Navigation</p>
    <button class="nav-drawer-close" type="button" id="navClose" aria-label="Navigation schließen">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" aria-hidden="true"><path d="M1 1 10 10M10 1 1 10"/></svg>
    </button>
  </div>
  <nav>
    <a class="nav-drawer-link" href="index.html">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3" width="12" height="10" rx="2"/><path d="M5 7h6M5 10h4"/></svg>
      Usecases
    </a>
    <a class="nav-drawer-link" href="roadmap.html">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12 5 4l4 5 3-3 2 6"/><circle cx="5" cy="4" r="1" fill="currentColor" stroke="none"/></svg>
      Roadmap Mosaic
    </a>
    <div class="nav-drawer-divider"></div>
    <a class="nav-drawer-link active" href="profile.html">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.314 2.686-6 6-6s6 2.686 6 6"/></svg>
      Profil bearbeiten
    </a>
    <div class="nav-drawer-divider"></div>
    <a class="nav-drawer-link" href="admin.html">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>
      Admin
    </a>
  </nav>
</aside>

<main class="page-shell">
  <div class="profile-card">
    <h1>Profil bearbeiten</h1>
    <p>Ändere deinen Namen oder wähle ein neues Profilbild.</p>

    <label for="username">Dein Name</label>
    <input class="input-name" id="username" type="text" placeholder="Dein Name" autocomplete="off" />

    <label>Profilbild</label>
    <div class="icon-grid" id="iconGrid"></div>

    <div class="form-actions">
      <button class="btn btn-primary" type="button" onclick="saveProfile()">Speichern</button>
      <button class="btn btn-secondary" type="button" onclick="goBack()">Abbrechen</button>
    </div>
    <div class="save-toast" id="saveToast">Profil gespeichert ✓</div>
  </div>
</main>

<script>
const ICONS = [
  "🦊","🐻","🐼","🦁","🐯","🦝","🐺","🦋",
  "🚀","💎","🎯","🔮","⭐","🌊","🌈","🌸",
  "🤖","👾","👻","🦄","🐉","🎨","🏆","💡",
  "⚡","🔥","❄️","🌿","🎸","🎲","🍕","☕",
  "🧩","🎭","🦸","🌙","🎪","🏄","🧠","🎵",
  "🦉","🐸","🦅","🐙","🦩","🦜","🐳","🦦",
  "🌵","🍄","🔭","🎮","🌍","🏔️","🌺","🎻",
  "🏹","🦎","🌋","🍀"
];

let selectedIcon = ICONS[0];

// Theme
let themeMode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
function applyTheme(mode) {
  themeMode = mode;
  document.documentElement.setAttribute('data-theme', mode);
  const btn = document.querySelector('[data-theme-toggle]');
  if (btn) btn.innerHTML = mode === 'dark' ? '<span aria-hidden="true">☀</span>' : '<span aria-hidden="true">☾</span>';
}
document.querySelector('[data-theme-toggle]')?.addEventListener('click', () => applyTheme(themeMode === 'dark' ? 'light' : 'dark'));
applyTheme(themeMode);

// Nav drawer
const navOverlay = document.getElementById('navOverlay');
const navDrawer  = document.getElementById('navDrawer');
function openNav()  { navOverlay.classList.add('open'); navDrawer.classList.add('open'); }
function closeNav() { navOverlay.classList.remove('open'); navDrawer.classList.remove('open'); }
document.getElementById('navOpen').addEventListener('click', openNav);
document.getElementById('navClose').addEventListener('click', closeNav);
navOverlay.addEventListener('click', closeNav);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeNav(); });

// Load current profile
const currentName = localStorage.getItem('username') || '';
const currentIcon = localStorage.getItem(`icon_${currentName}`) || ICONS[0];
selectedIcon = currentIcon;
document.getElementById('username').value = currentName;

// Render icon grid
const grid = document.getElementById('iconGrid');
grid.innerHTML = ICONS.map(icon =>
  `<button type="button" class="icon-option${icon === selectedIcon ? ' selected' : ''}" data-icon="${icon}" aria-label="Icon ${icon}">${icon}</button>`
).join('');
grid.addEventListener('click', e => {
  const btn = e.target.closest('.icon-option');
  if (!btn) return;
  selectedIcon = btn.dataset.icon;
  grid.querySelectorAll('.icon-option').forEach(el => el.classList.toggle('selected', el.dataset.icon === selectedIcon));
});

function saveProfile() {
  const name = document.getElementById('username').value.trim();
  if (!name) { document.getElementById('username').focus(); return; }
  localStorage.setItem('username', name);
  localStorage.setItem(`icon_${name}`, selectedIcon);
  const toast = document.getElementById('saveToast');
  toast.style.display = 'block';
  setTimeout(() => {
    toast.style.display = 'none';
    goBack();
  }, 900);
}

function goBack() {
  if (document.referrer && !document.referrer.includes('profile.html')) {
    history.back();
  } else {
    window.location.href = 'index.html';
  }
}
</script>
</body>
</html>
