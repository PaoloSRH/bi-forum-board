<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BI Forum Board</title>
<style>
body{font-family:Arial;margin:0;background:#f4f8fc}
header{background:#0B5CAB;color:white;padding:14px;text-align:center}
.tabs{display:flex}
.tab{flex:1;padding:10px;text-align:center;background:#ddd;cursor:pointer}
.tab.active{background:white;font-weight:bold}
.content{padding:15px}
.card{background:white;padding:12px;margin-bottom:10px;border-radius:10px}
.note{padding:10px;margin:8px 0;border-radius:10px;background:#fff5c2}
button{background:#0B5CAB;color:white;border:none;padding:8px;border-radius:5px;width:100%}
</style>
</head>
<body>
<header><h2>BI Forum Board</h2></header>
<div class="tabs">
<div class="tab active" onclick="switchTab('agents')">Agents</div>
<div class="tab" onclick="switchTab('mosaic')">Mosaic</div>
</div>
<div class="content" id="content"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, collection, addDoc, doc, updateDoc, increment, onSnapshot, query, where } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyD6M04k0RT5BXJC-Ilb1b392hzEBXq8J-A",
  authDomain: "bi-forum-2026.firebaseapp.com",
  projectId: "bi-forum-2026",
  storageBucket: "bi-forum-2026.firebasestorage.app",
  messagingSenderId: "305326324192",
  appId: "1:305326324192:web:1152fdc525122bda0dd385"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const BOARD_ID = "bi-forum-2026";

let currentTab='agents';

function switchTab(tab){
 currentTab=tab;
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 document.querySelectorAll('.tab')[tab==='agents'?0:1].classList.add('active');
 render();
 subscribe();
}

function render(notes=[]){
 document.getElementById('content').innerHTML=`
 <div class="card">
 <h3>${currentTab}</h3>
 <input id="title" placeholder="Titel"/><br/>
 <input id="text" placeholder="Beschreibung"/>
 <button onclick="addNote()">Add</button>
 </div>
 <div>${notes.map(n=>`
 <div class="note">
 <b>${n.title}</b><br>${n.text}<br>
 Votes: ${n.votes||0}
 <button onclick="vote('${n.id}')">Vote</button>
 </div>`).join('')}</div>
 `;
}

async function addNote(){
 const title=document.getElementById('title').value;
 const text=document.getElementById('text').value;
 if(!title)return;
 await addDoc(collection(db,'boards',BOARD_ID,'notes'),{
 title,text,topic:currentTab,votes:0
 });
}

async function vote(id){
 const ref=doc(db,'boards',BOARD_ID,'notes',id);
 await updateDoc(ref,{votes:increment(1)});
}

function subscribe(){
 const q=query(collection(db,'boards',BOARD_ID,'notes'),where('topic','==',currentTab));
 onSnapshot(q,(snapshot)=>{
 const notes=snapshot.docs.map(d=>({...d.data(),id:d.id}));
 render(notes);
 });
}

subscribe();
</script>
</body>
</html>
