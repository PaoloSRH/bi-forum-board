<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meine App</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --surface-soft: #f3f5f8;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --danger: #dc2626;
      --danger-soft: #fee2e2;
      --shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .app {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 18px 48px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 22px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.6rem;
      line-height: 1.1;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .content {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .panel, .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 18px;
    }

    .card {
      padding: 18px;
      position: relative;
      overflow: hidden;
    }

    .card.featured {
      border-color: rgba(37, 99, 235, 0.28);
      box-shadow: 0 16px 36px rgba(37, 99, 235, 0.14);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 28px;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 0.78rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button {
      border: 0;
      cursor: pointer;
      font: inherit;
    }

    .btn {
      min-height: 42px;
      padding: 10px 14px;
      border-radius: 14px;
      background: var(--primary);
      color: white;
      font-weight: 700;
    }

    .btn.secondary {
      background: var(--surface-soft);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .vote {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      padding: 10px 14px;
      border-radius: 14px;
      background: var(--surface-soft);
      border: 1px solid var(--border);
      color: var(--text);
      font-weight: 700;
    }

    .vote[aria-pressed="true"] {
      background: var(--primary);
      color: white;
      border-color: transparent;
    }

    .count {
      display: inline-block;
      min-width: 1.5ch;
    }

    @media (prefers-reduced-motion: no-preference) {
      .count.bump {
        animation: bump 220ms ease;
      }
      @keyframes bump {
        0% { transform: translateY(0) scale(1); }
        35% { transform: translateY(-3px) scale(1.12); }
        100% { transform: translateY(0) scale(1); }
      }
    }

    .menu-wrap {
      position: absolute;
      top: 16px;
      right: 16px;
    }

    .menu-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: var(--surface-soft);
      border: 1px solid var(--border);
      font-size: 1.2rem;
    }

    .menu {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      min-width: 170px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 8px;
      display: none;
    }

    .menu.open { display: grid; gap: 6px; }

    .menu-item {
      min-height: 40px;
      border-radius: 12px;
      padding: 10px 12px;
      background: transparent;
      text-align: left;
      font-weight: 700;
    }

    .menu-item:hover { background: var(--surface-soft); }
    .menu-item.delete { color: var(--danger); }
    .menu-item.delete:hover { background: var(--danger-soft); }

    .comments {
      margin-top: 14px;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 260ms ease, opacity 220ms ease, margin-top 220ms ease;
    }

    .comments.open {
      max-height: 500px;
      opacity: 1;
      margin-top: 14px;
    }

    .comment {
      padding: 10px 12px;
      border-radius: 14px;
      background: var(--surface-soft);
      margin-bottom: 8px;
    }

    .highlight {
      animation: highlight 1400ms ease;
    }

    @media (prefers-reduced-motion: no-preference) {
      @keyframes highlight {
        0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.24), var(--shadow); }
        45% { box-shadow: 0 0 0 12px rgba(37, 99, 235, 0.08), var(--shadow); }
        100% { box-shadow: var(--shadow); }
      }
    }

    @media (max-width: 640px) {
      .topbar { align-items: flex-start; flex-direction: column; }
      .app { padding: 18px 12px 32px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <h1>Meine App</h1>
        <p>Saubere Karten, Votes, Kommentare und schnelles Feedback.</p>
      </div>
    </header>

    <main class="content" id="board"></main>
  </div>

  <script>
    const data = [
      {
        id: "1",
        title: "Usecase A",
        text: "Das ist ein Beispiel-Usecase mit Beschreibung.",
        votes: 12,
        featured: true,
        voted: false,
        comments: ["Sieht gut aus!", "Wäre interessant für später."]
      },
      {
        id: "2",
        title: "Usecase B",
        text: "Noch ein Beispiel, damit du die Struktur sehen kannst.",
        votes: 5,
        featured: false,
        voted: false,
        comments: ["Guter Vorschlag."]
      }
    ];

    let openCommentsId = null;

    function createCard(item) {
      return `
        <article class="card ${item.featured ? 'featured' : ''}" id="card-${item.id}">
          ${item.featured ? '<div class="badge">Top-Usecase</div>' : ''}
          <div class="menu-wrap">
            <button class="menu-btn" type="button" onclick="toggleMenu('${item.id}')" aria-label="Weitere Aktionen">⋯</button>
            <div class="menu" id="menu-${item.id}">
              <button class="menu-item" type="button" onclick="alert('Bearbeiten')">Bearbeiten</button>
              <button class="menu-item delete" type="button" onclick="alert('Löschen')">Löschen</button>
            </div>
          </div>

          <h2 style="margin: 0 0 10px;">${item.title}</h2>
          <p style="margin: 0; color: var(--muted); line-height: 1.6;">${item.text}</p>

          <div class="toolbar">
            <button class="vote" type="button" aria-pressed="${item.voted ? 'true' : 'false'}" onclick="vote('${item.id}')">
              ▲ <span>Upvote</span> <span class="count" id="vote-count-${item.id}">${item.votes}</span>
            </button>
            <button class="btn secondary" type="button" aria-expanded="false" data-comments-toggle="${item.id}" onclick="toggleComments('${item.id}')">
              💬 Kommentare
            </button>
          </div>

          <div class="comments" id="comments-${item.id}">
            ${item.comments.map(c => `<div class="comment">${c}</div>`).join('')}
          </div>
        </article>
      `;
    }

    function render() {
      document.getElementById('board').innerHTML = data.map(createCard).join('');
    }

    function toggleMenu(id) {
      document.querySelectorAll('.menu').forEach(m => {
        if (m.id !== `menu-${id}`) m.classList.remove('open');
      });
      document.getElementById(`menu-${id}`).classList.toggle('open');
    }

    function toggleComments(id) {
      const current = document.getElementById(`comments-${id}`);
      const open = current.classList.contains('open');

      document.querySelectorAll('.comments.open').forEach(box => {
        if (box.id !== `comments-${id}`) box.classList.remove('open');
      });

      document.querySelectorAll('[data-comments-toggle]').forEach(btn => {
        btn.setAttribute('aria-expanded', btn.getAttribute('data-comments-toggle') === id && !open ? 'true' : 'false');
      });

      current.classList.toggle('open', !open);
      openCommentsId = !open ? id : null;
    }

    function animateCount(el) {
      el.classList.remove('bump');
      void el.offsetWidth;
      el.classList.add('bump');
    }

    function vote(id) {
      const item = data.find(x => x.id === id);
      if (!item || item.voted) return;

      item.votes += 1;
      item.voted = true;

      const countEl = document.getElementById(`vote-count-${id}`);
      const btn = countEl.closest('.vote');
      btn.setAttribute('aria-pressed', 'true');
      countEl.textContent = item.votes;
      animateCount(countEl);
    }

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.menu-wrap')) {
        document.querySelectorAll('.menu').forEach(m => m.classList.remove('open'));
      }
    });

    render();
  </script>
</body>
</html>
