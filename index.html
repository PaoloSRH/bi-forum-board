<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BI Forum Board</title>

<style>
body {
  margin:0;
  font-family:Segoe UI;
  background:#eef3f8;
}

/* HEADER */
header {
  background:#0B5CAB;
  color:white;
  padding:15px;
  text-align:center;
}

/* TABS */
.tabs {
  display:flex;
  background:#fff;
}
.tab {
  flex:1;
  text-align:center;
  padding:12px;
  cursor:pointer;
  font-weight:bold;
}
.tab.active {
  background:#0B5CAB;
  color:white;
}

/* BOARD */
#board {
  padding:15px;
  display:flex;
  flex-wrap:wrap;
  gap:15px;
}

/* STICKY NOTES */
.note {
  background:#fff7b2;
  padding:15px;
  width:220px;
  min-height:180px;
  border-radius:12px;
  box-shadow:0 8px 16px rgba(0,0,0,0.1);
  transform:rotate(-1deg);
}

.note:nth-child(2n){transform:rotate(1deg)}
.note:nth-child(3n){transform:rotate(-2deg)}

.note h4 {
  margin:0 0 6px 0;
}

.vote {
  margin-top:10px;
}

button {
  background:#0B5CAB;
  color:white;
  border:none;
  padding:6px;
  border-radius:6px;
  cursor:pointer;
  width:100%;
}

/* FLOAT BUTTON */
.fab {
  position:fixed;
  bottom:15px;
  right:15px;
  background:#FFD200;
  color:black;
  padding:15px;
  border-radius:50%;
  font-size:20px;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.4);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:white;
  padding:20px;
  border-radius:12px;
  width:90%;
}
 
 .comments {
   margin-top:10px;
   background:rgba(0,0,0,0.03);
   padding:8px;
   border-radius:8px;
 }

input {
  width:100%;
  padding:8px;
  margin:5px 0;
}
</style>
</head>

<body>

<header>
<h2>BI Forum Interactive Board</h2>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('agents')">Agents</div>
  <div class="tab" onclick="switchTab('mosaic')">Mosaic</div>
</div>

<div id="board"></div>

<div class="fab" onclick="openModal()">+</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h3>Neuer Usecase</h3>
<input id="title" placeholder="Titel"/>
<input id="text" placeholder="Beschreibung"/>
<button onclick="addNote()">Speichern</button>
</div>
</div>

<!-- NAME MODAL -->
<div class="modal" id="nameModal">
  <div class="modal-content">
    <h3>Willkommen — bitte Namen eingeben</h3>
    <input id="username" placeholder="Dein Name" />
    <button onclick="saveUsername()">Speichern</button>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, collection, addDoc, doc, updateDoc, increment, onSnapshot, query, where, getDocs, serverTimestamp, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyD6M04k0RT5BXJC-Ilb1b392hzEBXq8J-A",
  authDomain: "bi-forum-2026.firebaseapp.com",
  projectId: "bi-forum-2026",
  storageBucket: "bi-forum-2026.firebasestorage.app",
  messagingSenderId: "305326324192",
  appId: "1:305326324192:web:1152fdc525122bda0dd385"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const BOARD_ID = "bi-forum-2026";

let currentTab = "agents";

/* SWITCH */
window.switchTab = function(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab')[tab==='agents'?0:1].classList.add('active');
  subscribe();
}

/* MODAL */
window.openModal = () => document.getElementById("modal").style.display="flex";

/* ADD */
window.addNote = async function() {
  const title = document.getElementById("title").value;
  const text = document.getElementById("text").value;

  if(!title) return;

  await addDoc(collection(db,'boards',BOARD_ID,'notes'),{
    title,
    text,
    topic:currentTab,
    votes:0,
    author: window.username || localStorage.getItem('username') || 'Anonymous'
  });

  document.getElementById("modal").style.display="none";
}

window.checkUsername = function(){
  const name = localStorage.getItem('username');
  if(!name){
    document.getElementById('nameModal').style.display = 'flex';
  } else {
    window.username = name;
    subscribe();
  }
}

window.saveUsername = function(){
  const v = document.getElementById('username').value.trim();
  if(!v) return;
  localStorage.setItem('username', v);
  window.username = v;
  document.getElementById('nameModal').style.display = 'none';
  subscribe();
}

// COMMENTS
async function loadComments(noteId){
  const container = document.getElementById(`comments-${noteId}`);
  if(!container) return;
  const q = query(collection(db,'boards',BOARD_ID,'notes',noteId,'comments'), orderBy('ts','asc'));
  const snap = await getDocs(q);
  const comments = snap.docs.map(d=>d.data());
  container.innerHTML = `
    ${comments.map(c=>`<div><strong>${c.author}</strong>: ${c.text}</div>`).join('')}
    <div style="margin-top:8px">
      <input id="comment-input-${noteId}" placeholder="Kommentar..." />
      <button onclick="addComment('${noteId}')">Kommentieren</button>
    </div>
  `;
  container.style.display='block';
}

window.toggleComments = function(noteId){
  const container = document.getElementById(`comments-${noteId}`);
  if(!container) return loadComments(noteId);
  if(container.style.display==='block') container.style.display='none'; else loadComments(noteId);
}

window.addComment = async function(noteId){
  const input = document.getElementById(`comment-input-${noteId}`);
  if(!input) return;
  const text = input.value.trim();
  if(!text) return;
  const author = window.username || localStorage.getItem('username') || 'Anonymous';
  await addDoc(collection(db,'boards',BOARD_ID,'notes',noteId,'comments'),{
    author,
    text,
    ts: serverTimestamp()
  });
  input.value='';
  loadComments(noteId);
}

/* VOTE */
window.vote = async function(id){
  await updateDoc(doc(db,'boards',BOARD_ID,'notes',id),{
    votes:increment(1)
  });
}

/* LOAD */
function subscribe(){
  const q = query(collection(db,'boards',BOARD_ID,'notes'),where('topic','==',currentTab));

  onSnapshot(q,(snap)=>{
    let notes = snap.docs.map(d=>({...d.data(),id:d.id}));

    notes.sort((a,b)=>b.votes-a.votes);

    document.getElementById("board").innerHTML =
      notes.map(n=>`
      <div class="note">
        <h4>${n.title}</h4>
        <small>Von: ${n.author || 'Unbekannt'}</small>
        <p>${n.text}</p>
        <div class="vote">
          Votes: ${n.votes || 0}
          <button onclick="vote('${n.id}')">👍 Vote</button>
        </div>
        <div style="margin-top:8px">
          <button onclick="toggleComments('${n.id}')">💬 Kommentare</button>
        </div>
        <div id="comments-${n.id}" class="comments" style="display:none"></div>
      </div>
      `).join("");
  });
}

checkUsername();

</script>

</body>
</html>
